databases:
  - name: stonecraftcafe-db
    databaseName: stonecraftcafe
    user: stonecraftcafe
    plan: free

services:
  - type: web
    name: stonecraftcafe
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: stonecraftcafe-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
